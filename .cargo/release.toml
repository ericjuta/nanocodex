# Local stand-ins let the first synchronized release package crates that depend
# on sibling packages before those versions exist in the crates.io index. This
# config is passed only to the non-publishing package validation step.
[patch.crates-io]
nanocodex = { path = "crates/nanocodex" }
nanocodex-core = { path = "crates/nanocodex-core" }
nanocodex-macros = { path = "crates/nanocodex-macros" }
nanocodex-mcp = { path = "crates/nanocodex-mcp" }
nanocodex-observability = { path = "crates/nanocodex-observability" }
nanocodex-service = { path = "crates/nanocodex-service" }
nanocodex-tools = { path = "crates/nanocodex-tools" }
