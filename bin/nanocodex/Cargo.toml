[package]
name = "nanocodex-bin"
version.workspace = true
edition.workspace = true
rust-version = "1.93"
publish = false
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Daily-driver TUI and headless JSONL adapter for Nanocodex"

[dependencies]
alloy-transport-mpp = { version = "=0.2.0", git = "https://github.com/tempoxyz/mpp-rs", rev = "c570cdc48c0847ad4c5e62667b5c8ba19ee230dc" }
clap.workspace = true
crossterm.workspace = true
dotenvy.workspace = true
eyre.workspace = true
futures-util.workspace = true
nanocodex.workspace = true
nanocodex-observability.workspace = true
mpp = { version = "=0.11.0", git = "https://github.com/tempoxyz/mpp-rs", rev = "c570cdc48c0847ad4c5e62667b5c8ba19ee230dc", default-features = false, features = ["tempo", "ws", "sqlite", "reqwest-rustls-tls"] }
ratatui.workspace = true
reqwest.workspace = true
reqwest13 = { package = "reqwest", version = "0.13", default-features = false, features = ["rustls"] }
self-replace.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tokio = { workspace = true, features = ["fs", "io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
tokio-tungstenite.workspace = true
tracing.workspace = true
unicode-width.workspace = true

[dev-dependencies]
criterion.workspace = true
tokio-tungstenite.workspace = true

[[bench]]
name = "tui_render"
harness = false

[[bin]]
name = "nanocodex"
path = "src/main.rs"
doc = false

[lints]
workspace = true
